name: CI Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Verificar Docker
        run: docker --version

      - name: Build da imagem Docker
        run: docker build -t fastapi-lab .

      - name: Run container
        run: docker run -d -p 8000:8000 fastapi-lab .

      - name: Testar endpoint
        run: |
          sleep 5 
          curl http://localhost:8000/health
